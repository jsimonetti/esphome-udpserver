# ESPHome UDP Server - Arduino Framework Test Configuration
esphome:
  name: udpserver-arduino-test

# Use Arduino framework
esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: "TestSSID"
  password: "TestPassword"
  manual_ip:
    static_ip: 192.168.1.100
    gateway: 192.168.1.1
    subnet: 255.255.255.0

# Enable logging
logger:
  level: DEBUG
  baud_rate: 115200

# UDP Server component
external_components:
  - source: 
      type: local
      path: ../components
    components: [ udpserver ]

udpserver:
  listen_port: 8888
  on_string_data:
    - then:
        - logger.log:
            format: "Arduino UDP RX [%s:%d]: %s"
            args: ['udp.get_remote_ip()', 'udp.get_remote_port()', 'data.c_str()']
        - lambda: |-
            std::string response = "Arduino-ACK:" + data;
            if (udp.send_response(response)) {
              ESP_LOGI("udpserver", "Response sent successfully");
            } else {
              ESP_LOGE("udpserver", "Failed to send response");
            }
